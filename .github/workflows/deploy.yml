name: Deploy demo to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PNPM
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build @confucian-ui/vuetify
        run: pnpm --filter @confucian-ui/vuetify build

      - name: Build demo
        run: pnpm --filter confucian-demo build

      - name: Deploy to Pages repo
        run: |
          cd packages/demo/dist
          git init
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Deploy from ${GITHUB_SHA::7}"
          git push --force "https://x-access-token:${{ secrets.PAGES_DEPLOY_TOKEN }}@github.com/confucian-ui/confucian-ui.github.io.git" HEAD:main
